paragraph=Companion library for GxEPD2 adding driver classes for Pervasive Displays "Spectra" BWR panels that GxEPD2 does not support out of the box. Supported: E2266JS0C (2.66" BWR, 296x152) and 2581JSBF1 (SES-imagotag / VUSION 5.9" BWR, 720x256, reverse-engineered). Use with the GxEPD2_3C template. Requires GxEPD2 and Adafruit GFX.
