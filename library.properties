sentence=GxEPD2 add-on drivers for Pervasive Displays and SES-imagotag / VUSION ESL e-paper panels.
paragraph=Companion library for GxEPD2 adding driver classes for Pervasive Displays "Spectra" BWR panels that GxEPD2 does not support out of the box. Supported: SE2266JS0C5 (2.66" BWR, 296x152), SE2581JSBF1 (SES-imagotag / VUSION 5.9" BWR, 720x256, reverse-engineered), SE2581JS0G1 (VUSION 5.9" BWR, 720x256, iTC) and TE2969JS0B4 (VUSION 9.7" BWR, 960x672, dual-COG). Use with the GxEPD2_3C template. Requires GxEPD2 and Adafruit GFX.
category=Display
url=https://github.com/shanislav/GxEPD2_PervasiveDisplays
architectures=*
depends=GxEPD2,Adafruit GFX Library
